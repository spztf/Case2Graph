<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" width="920" height="480">
  <defs>
    <marker id="arrowSolid" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <rect width="920" height="480" fill="#FAFBFC" rx="6"/>
  <text x="460" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1F2937" text-anchor="middle">Fig. 4: Case 3 — Profit Shifting via Transfer Pricing Manipulation</text>

  <!-- Participant boxes -->
  <rect x="35" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="100" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">Chinese</text>
  <text x="100" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">Consumers</text>

  <rect x="215" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="280" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">I China Brand Co.</text>
  <text x="280" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Fully Functional)</text>

  <rect x="395" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="460" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">J Hong Kong</text>
  <text x="460" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Shell IP Holder)</text>

  <rect x="575" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="640" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">International</text>
  <text x="640" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">Market</text>

  <rect x="755" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="820" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">Tax</text>
  <text x="820" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">Authority</text>

  <!-- Lifelines -->
  <line x1="100" y1="79" x2="100" y2="455" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="280" y1="79" x2="280" y2="455" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="460" y1="79" x2="460" y2="455" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="640" y1="79" x2="640" y2="455" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="820" y1="79" x2="820" y2="455" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Messages -->
  <line x1="160" y1="95" x2="220" y2="95" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="190" y="89" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">1. Purchase at market prices</text>

  <line x1="340" y1="130" x2="400" y2="130" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="370" y="124" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">2. Brand royalty: 15-20% of revenue</text>

  <line x1="340" y1="165" x2="400" y2="165" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="370" y="159" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">3. Fabric/design import: +30-50%</text>

  <line x1="340" y1="200" x2="400" y2="200" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="370" y="194" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">4. Cost-plus sale of finished goods</text>

  <line x1="520" y1="235" x2="580" y2="235" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="550" y="229" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">5. Normal-price sale → profit</text>

  <line x1="340" y1="275" x2="760" y2="275" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrowDash)"/>
  <text x="550" y="269" font-family="Arial, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">6. Declare minimal/zero profit</text>

  <!-- Notes -->
  <rect x="120" y="308" width="310" height="30" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" opacity="0.85"/>
  <text x="275" y="320" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">Bidirectional Pricing: high import prices +</text>
  <text x="275" y="333" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">low export prices = profit shift to HK</text>

  <rect x="120" y="355" width="310" height="30" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" opacity="0.85"/>
  <text x="275" y="367" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">Functional-Risk Mismatch: I bears all</text>
  <text x="275" y="380" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">functions/risks; J is empty IP shell</text>

  <rect x="480" y="405" width="240" height="28" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" opacity="0.85"/>
  <text x="600" y="417" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">Tax Arbitrage: China 25% vs. HK 16.5%</text>
  <text x="600" y="429" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">profit retained in low-tax jurisdiction</text>
</svg>