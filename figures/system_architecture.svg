<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" width="1100" height="580">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <linearGradient id="gradModule1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradModule2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D1FAE5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A7F3D0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradModule3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1100" height="580" fill="#FAFBFC" rx="8"/>
  <rect x="20" y="10" width="340" height="260" rx="10" fill="url(#gradModule1)" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="38" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">Module 1: Case → Graph (PieStream)</text>
  <rect x="45" y="52" width="290" height="40" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="190" y="68" font-family="Arial, sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">Adjudicated Case Documents</text>
  <text x="190" y="82" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">(court judgments, admin decisions)</text>
  <line x1="190" y1="92" x2="190" y2="112" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="45" y="112" width="290" height="50" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="190" y="133" font-family="Arial, sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">Joint Entity-Relation Extraction</text>
  <text x="190" y="150" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">+ Temporal-Causal Chain Modeling</text>
  <line x1="190" y1="162" x2="190" y2="182" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="60" y="182" width="260" height="38" rx="6" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="190" y="200" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#1E40AF" text-anchor="middle">Seed Case Knowledge Graph</text>
  <text x="190" y="214" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">(20-50 nodes, temporal-causal edges)</text>
  <line x1="360" y1="140" x2="410" y2="140" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)" stroke-dasharray="6,3"/>
  <rect x="410" y="10" width="340" height="260" rx="10" fill="url(#gradModule2)" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="38" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065F46">Module 2: Graph → Subgraph</text>
  <rect x="435" y="52" width="290" height="40" rx="6" fill="white" stroke="#6EE7B7" stroke-width="1"/>
  <text x="580" y="68" font-family="Arial, sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">Subgraph Embedding Encoder</text>
  <text x="580" y="82" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">(SubGNN-inspired, 3-channel)</text>
  <line x1="580" y1="92" x2="580" y2="112" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="435" y="112" width="290" height="50" rx="6" fill="white" stroke="#6EE7B7" stroke-width="1"/>
  <text x="580" y="133" font-family="Arial, sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">FAISS ANN Search</text>
  <text x="580" y="150" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">+ Rule Filter Cascade</text>
  <line x1="580" y1="162" x2="580" y2="182" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="450" y="182" width="260" height="38" rx="6" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
  <text x="580" y="200" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#065F46" text-anchor="middle">Top-K Candidate Subgraphs</text>
  <text x="580" y="214" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">(ranked by similarity + rules)</text>
  <rect x="650" y="238" width="90" height="30" rx="5" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="695" y="257" font-family="Arial, sans-serif" font-size="8" fill="#065F46" text-anchor="middle">Enterprise KG</text>
  <line x1="620" y1="253" x2="650" y2="253" stroke="#059669" stroke-width="1" marker-end="url(#arrowBlue)"/>
  <line x1="750" y1="140" x2="800" y2="140" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)" stroke-dasharray="6,3"/>
  <rect x="800" y="10" width="280" height="260" rx="10" fill="url(#gradModule3)" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="38" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400E">Module 3: Graph → Narrative</text>
  <rect x="825" y="52" width="230" height="40" rx="6" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="940" y="68" font-family="Arial, sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">Graph-to-JSON Structuring</text>
  <text x="940" y="82" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">(ground truth anchor)</text>
  <line x1="940" y1="92" x2="940" y2="112" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="825" y="112" width="230" height="50" rx="6" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="940" y="133" font-family="Arial, sans-serif" font-size="10.5" fill="#374151" text-anchor="middle">LLM Generation (GPT-4, T=0.2)</text>
  <text x="940" y="150" font-family="Arial, sans-serif" font-size="8.5" fill="#6B7280" text-anchor="middle">4-element prompt template</text>
  <line x1="940" y1="162" x2="940" y2="182" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="815" y="182" width="250" height="55" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="940" y="200" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold" fill="#92400E" text-anchor="middle">Investigation Report</text>
  <text x="940" y="216" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">Motive · Method · Process</text>
  <text x="940" y="230" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" text-anchor="middle">· Evidence Gaps</text>
  <rect x="20" y="290" width="1060" height="80" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="550" y="318" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155" text-anchor="middle">Social Computing Paradigm: "Case-Driven" Risk Discovery</text>
  <text x="550" y="340" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Adjudicated cases → structural pattern templates → proactive screening → human-auditable narrative → field investigation</text>
  <text x="550" y="358" font-family="Arial, sans-serif" font-size="9.5" fill="#64748B" text-anchor="middle">Domain-agnostic pipeline. Adaptable to: Anti-Money Laundering · Healthcare Fraud · Export Tax Rebate Fraud · Social Security Evasion</text>
  <rect x="20" y="390" width="1060" height="170" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="40" y="415" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155">Key Innovations per Module</text>
  <text x="40" y="440" font-family="Arial, sans-serif" font-size="10" fill="#1E40AF">Module 1:</text>
  <text x="120" y="440" font-family="Arial, sans-serif" font-size="10" fill="#475569">Joint entity-relation-causal extraction in a unified framework.</text>
  <text x="120" y="456" font-family="Arial, sans-serif" font-size="10" fill="#475569">Explicit modeling of temporal order and causal linkage between relations.</text>
  <text x="40" y="478" font-family="Arial, sans-serif" font-size="10" fill="#065F46">Module 2:</text>
  <text x="120" y="478" font-family="Arial, sans-serif" font-size="10" fill="#475569">Subgraph-level embedding for cross-graph pattern retrieval (not node-level anomaly detection).</text>
  <text x="120" y="494" font-family="Arial, sans-serif" font-size="10" fill="#475569">Hybrid retrieval: dense vector similarity (FAISS) + rule-based structural constraints.</text>
  <text x="40" y="516" font-family="Arial, sans-serif" font-size="10" fill="#92400E">Module 3:</text>
  <text x="120" y="516" font-family="Arial, sans-serif" font-size="10" fill="#475569">Graph-anchored generation to constrain LLM hallucination (92%+ fact traceability).</text>
  <text x="120" y="532" font-family="Arial, sans-serif" font-size="10" fill="#475569">Four-element narrative (Motive/Method/Process/Evidence Gaps) bridges algorithm to field action.</text>
  <text x="120" y="548" font-family="Arial, sans-serif" font-size="10" fill="#475569">Sequence diagrams rendered from temporal-causal chain data.</text>
</svg>