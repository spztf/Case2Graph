  <text x="110" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Payers)</text>

  <rect x="215" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="280" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">Campus Managers</text>
  <text x="280" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Personal A/C)</text>

  <rect x="385" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="450" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">Financial Controller</text>
  <text x="450" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Wu)</text>

  <rect x="555" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="620" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">Controller Zheng</text>
  <text x="620" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Personal A/C)</text>

  <rect x="725" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="790" y="58" font-family="Arial, sans-serif" font-size="8.5" fill="#1E40AF" text-anchor="middle">F Company</text>
  <text x="790" y="72" font-family="Arial, sans-serif" font-size="7.5" fill="#3B82F6" text-anchor="middle">(Corporate A/C)</text>

  <!-- Lifelines -->
  <line x1="110" y1="79" x2="110" y2="415" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="280" y1="79" x2="280" y2="415" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="450" y1="79" x2="450" y2="415" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="620" y1="79" x2="620" y2="415" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="790" y1="79" x2="790" y2="415" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Messages -->
  <line x1="170" y1="95" x2="220" y2="95" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="195" y="89" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">1. Tuition → WeChat/Alipay</text>

  <line x1="340" y1="135" x2="390" y2="135" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="365" y="129" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">2. Periodic fund aggregation</text>

  <line x1="510" y1="175" x2="560" y2="175" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="535" y="169" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">3. Bulk transfer to controller</text>

  <line x1="620" y1="205" x2="620" y2="225" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="620" y="200" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">4. Personal use:</text>
  <text x="620" y="235" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">property, wealth mgmt</text>

  <line x1="170" y1="250" x2="730" y2="250" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrowDash)"/>
  <text x="450" y="244" font-family="Arial, sans-serif" font-size="8" fill="#9CA3AF" text-anchor="middle">5. Invoice-requesting parents only</text>

  <line x1="790" y1="280" x2="790" y2="300" stroke="#374151" stroke-width="1.2" marker-end="url(#arrowSolid)"/>
  <text x="790" y="275" font-family="Arial, sans-serif" font-size="8" fill="#374151" text-anchor="middle">6. Only corporate revenue</text>
  <text x="790" y="310" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">declared → tax</text>

  <!-- Notes -->
  <rect x="90" y="330" width="280" height="28" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" opacity="0.85"/>
  <text x="230" y="342" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">"Shadow Ledger": internal accounting of</text>
  <text x="230" y="354" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">all non-corporate receipts</text>

  <rect x="450" y="368" width="260" height="28" rx="3" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" opacity="0.85"/>
  <text x="580" y="380" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">Revenue Gap: True revenue >> declared</text>
  <text x="580" y="392" font-family="Arial, sans-serif" font-size="7.5" fill="#92400E" text-anchor="middle">(300M RMB declared vs. 2000+ students)</text>
</svg>