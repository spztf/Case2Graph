<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <defs>
    <marker id="arrowSolid" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>
  <rect width="900" height="440" fill="#FAFBFC" rx="6"/>
  <text x="450" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1F2937" text-anchor="middle">Fig. 3: Case 2 — Income Concealment via Personal Accounts</text>

  <!-- Participant boxes -->
  <rect x="45" y="45" width="130" height="34" rx="4" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1.5"/>
